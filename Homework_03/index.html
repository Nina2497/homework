<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
    <link rel="stylesheet" href="../Homework_03/style.css">

<body>

    <form class="form">
        <fieldset class="demo" type>
            <label>
                <legend class="le">
                    Ваши личные данные
                </legend>
            </label>

            <label class="label">
                Ваше имя
                <input class="input" type="name" name="name" placeholder="Имя" required>
            </label>
            <label>
                Ваш возраст
                <input type="number" name="age" inputmode="numeric" placeholder="Возраст" required>
            </label>
            <label>
                Ваш номер телефона
                <input type="tel" name="phone" inputmode="tel" placeholder="Телефон" required>
            </label>
            <label>
                Ваша почта
                <input type="email" name="email" inputmode="email" placeholder="Почта" required>
            </label>
            <label>
                Ваш пароль
                <input type="password" name="password" placeholder="Пароль" required>
            </label>
            <label>
                Сообщение
                <textarea class="textarea" name="message" placeholder="Ваше сообщение"></textarea>
            </label>
            <label>
                <input class="checkbox" type="checkbox" name="checkbox" placeholder="" required>
                Я принимаю правила
            </label>
            <button type="" class="button">Отправить форму</button>
            <button type="reset" class="button">Очистить форму</button>
        </fieldset>
    </form>

</body>

</html
